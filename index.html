<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');
:root {
  --bg:#0E1A2B; --panel:#16233A; --panel-alt:#101C2E; --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.18); --text:#F4F1E8; --text-dim:#DCE1E8; --text-muted:#B7C0CE;
  --text-faint:#7C8CA6; --gold:#C9A227; --green:#6FAE8B; --red:#D9714E;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
html, body { overflow-x: hidden; max-width: 100vw; }
body { margin:0; background:var(--bg); color:var(--text-dim); font-family:'Inter',sans-serif; font-size:14px; }
.wrap { max-width:1100px; width:100%; margin:0 auto; padding:20px 16px 60px; overflow-x:hidden; }
h1 { font-family:'Source Serif 4',serif; color:var(--text); font-size:24px; margin:4px 0 2px; }
.eyebrow { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); }
.subtext { color:var(--text-faint); font-size:12px; margin-bottom:16px; }
.tabs { display:flex; gap:2px; margin-bottom:18px; flex-wrap:wrap; border-bottom:1px solid var(--border); -webkit-overflow-scrolling:touch; }
.tab { padding:10px 13px; font-size:12.5px; cursor:pointer; color:var(--text-faint); border-bottom:2px solid transparent; font-weight:500; user-select:none; white-space:nowrap; }
.tab.active { color:var(--text); border-bottom-color:var(--gold); font-weight:600; }
.view { display:none; flex-direction:column; gap:16px; }

.panel { background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:15px 16px 18px; }
.panel h3 { font-family:'Source Serif 4',serif; color:var(--text); font-size:16px; margin:4px 0 10px; font-weight:600; }
.peyebrow { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-faint); margin-bottom:2px; }
.kpi-row { display:flex; gap:10px; flex-wrap:wrap; }
.kpi { flex:1; min-width:140px; background:var(--panel-alt); border:1px solid var(--border); border-radius:4px; padding:11px 13px; }

.kpi .value.bad { color:var(--red); } .kpi .value.good { color:var(--green); }
table { width:100%; border-collapse:collapse; font-size:12px; }

th.l, td.l { text-align:left; }
td { text-align:right; padding:5px 7px; font-family:'IBM Plex Mono',monospace; color:var(--text-dim); border-bottom:1px solid var(--border); white-space:nowrap; }
tr:hover td { background:rgba(255,255,255,0.02); }
.bold { font-weight:600; color:var(--gold) !important; }
.tablewrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.cat-title { display:flex; justify-content:space-between; align-items:baseline; margin-top:14px; margin-bottom:4px; }
.cat-title span.name { font-family:'Source Serif 4',serif; color:var(--text); font-size:15px; font-weight:600; }
.ledger-row { display:flex; align-items:baseline; gap:8px; padding:6px 0; }
.ledger-row .lbl { color:var(--text-muted); font-size:12.5px; flex-shrink:0; }
.ledger-row .lbl.b { color:var(--text); font-weight:600; font-size:13.5px; }
.ledger-row .dots { flex:1; border-bottom:1px dotted var(--border-strong); transform:translateY(-4px); margin:0 4px; }
.ledger-row .val { font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--text-dim); flex-shrink:0; }
.ledger-row .val.b { color:var(--gold); font-weight:600; font-size:13.5px; }
.btn { background:var(--gold); color:var(--bg); border:none; border-radius:4px; padding:10px 16px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
.btn.secondary { background:var(--panel-alt); color:var(--text-muted); border:1px solid var(--border); }

.item-form input, .item-form select { background:var(--panel-alt); border:1px solid var(--border-strong); color:var(--text-dim); padding:9px 8px; border-radius:4px; font-size:13px; font-family:'Inter',sans-serif; }

a { color:var(--gold); }

.filter-row .field { display:flex; flex-direction:column; gap:4px; }
.filter-row label { font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.06em; }
.filter-row select { background:var(--panel-alt); border:1px solid var(--border-strong); color:var(--text-dim); padding:8px; border-radius:4px; font-size:12.5px; font-family:'Inter',sans-serif; }

.card-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }

.action-card { background:var(--panel-alt); border:1px solid var(--border); border-radius:4px; padding:14px; }

<script>
const INF = 999;
const ITEMS_KEY = "items-v3";
const CONFIG_KEY = "sheet-config-v2";
const HIERARCHY_KEY = "hierarchy-v1";

// Hoje = 17/07/2026 → mês 1 do horizonte é Jul/2026 (mês atual)
const ANCHOR_YEAR = 2026, ANCHOR_MONTH0 = 6; // 0-indexado: Jul = 6
const MESES_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function monthLabel(m) {
  const am = ANCHOR_MONTH0 + (m - 1);
  const year = ANCHOR_YEAR + Math.floor(am / 12);
  const month = ((am % 12) + 12) % 12;
  return `${MESES_PT[month]}/${String(year).slice(2)}`;
}
// Períodos alinhados ao calendário: 1º = Jul–Dez/26 (6 meses), os demais = ano civil completo
const PERIODS = [
  { start: 1, end: 6 },
  { start: 7, end: 18 },
  { start: 19, end: 30 },
  { start: 31, end: 42 },
  { start: 43, end: 54 },
];
function yearLabel(p) {
  const { start, end } = PERIODS[p - 1];
  return `${monthLabel(start)}–${monthLabel(end)}`;
}
// "2026-08" -> índice de mês (1 = Jul/2026)
function isoToM(iso) {
  if (!iso) return 1;
  const [y, mo] = iso.split('-').map(Number);
  const am = (y - ANCHOR_YEAR) * 12 + (mo - 1);
  return am - ANCHOR_MONTH0 + 1;
}
// índice de mês -> "2026-08"
function mToIso(m) {
  const am = ANCHOR_MONTH0 + (m - 1);
  const year = ANCHOR_YEAR + Math.floor(am / 12);
  const month0 = ((am % 12) + 12) % 12;
  return `${year}-${String(month0 + 1).padStart(2,'0')}`;
}
const HOJE_ISO = mToIso(1);

const DEFAULT_HIERARCHY = {
  "Receita": ["Bruno","Samiah"],
  "Despesas Fixas": ["Moradia","Utilidades","Saúde","Transporte","Lazer/Bem-estar"],
  "Impostos": ["Bruno","Samiah (PJ)"],
  "Cartão de Crédito": ["Assinaturas","Parcelamentos","Compras Variáveis"],
  "Empréstimos": ["Veículo","Imóvel","Previbosch","Pronampe"]
};
let HIERARCHY = {};
let TOP_CATS = [];

function seedItems() {
  const rows = []; let id = 1;
  const add = (categoria, subcategoria, titular, descricao, valor, dataInicio, duracaoMeses, obs) =>
    rows.push({ id: id++, categoria, subcategoria, titular, descricao, valor, dataInicio, duracaoMeses, obs: obs||"" });

  add("Receita","Bruno","Bruno","Salário Bruno",20777.22,HOJE_ISO,INF,"Receita bruta");
  add("Receita","Samiah","Samiah","Salário/Pró-labore Samiah",20284.00,HOJE_ISO,INF,"Receita bruta");
  [["Moradia","Condomínio",1000],["Moradia","IPTU",390],["Utilidades","Energia",160],
   ["Utilidades","Água",150],["Utilidades","Gás",80],["Utilidades","Vivo (internet + celular)",400],
   ["Saúde","Dentista filha",240],["Transporte","Sem Parar",80],["Transporte","Estacionamento Samiah",260],
   ["Lazer/Bem-estar","Flow Academia",250],["Lazer/Bem-estar","Vinhos",400],["Lazer/Bem-estar","Jazz",180]
  ].forEach(([sub,n,v]) => add("Despesas Fixas",sub,"Família",n,v,HOJE_ISO,INF));
  add("Impostos","Bruno","Bruno","INSS",951.62,HOJE_ISO,INF);
  add("Impostos","Bruno","Bruno","IRPF",4439.04,HOJE_ISO,INF);
  add("Impostos","Bruno","Bruno","Seguro de vida",84.40,HOJE_ISO,INF);
  add("Impostos","Samiah (PJ)","Samiah","INSS (PJ)",502.51,HOJE_ISO,INF);
  add("Impostos","Samiah (PJ)","Samiah","DAS (PJ)",1128.50,HOJE_ISO,INF);
  [["Apple (iCloud)",9.99],["Terra Brasil",57.42],["Amazon Prime Canais",29.90],
   ["Amazon Prime (membership)",19.90],["Anthropic Claude (+IOF)",113.85],
   ["Netflix",44.90],["JusBrasil",58.90],["Globoplay",27.90]
  ].forEach(([n,v]) => add("Cartão de Crédito","Assinaturas","Bruno",n,v,HOJE_ISO,INF,"Cartão Bradesco"));
  [["ChatGPT / OpenAI",107.60],["Disney Plus",26.50],["Leiturinha",53.60]
  ].forEach(([n,v]) => add("Cartão de Crédito","Assinaturas","Samiah",n,v,HOJE_ISO,INF,"Cartão Bradesco"));

  // Parcelamentos: datas reais de início derivadas das faturas
  [["Amazon Diego Pereira",39.95,"2026-07",2],["Amazon Topsystem",132.31,"2026-06",12],
   ["Amazon CPI (Amazon BR)",36.38,"2026-06",12],["Ophicinales Farmácia",85.29,"2026-05",6],
   ["Bradesco Auto (seguro)",91.99,"2026-05",10],["Armário Sophie",144.21,"2026-04",10],
   ["Surfco",53.94,"2026-04",5],["Zeiss Vinhedo (óculos)",444.66,"2026-04",6],
   ["Zurich Seguros",182.29,"2026-03",12],["HTM Lancheira Juju",19.66,"2026-02",12],
   ["International School",166.61,"2026-02",12],["Assiny Katon Tecnologia",38.16,"2026-02",10],
   ["Globoplay (parcelado)",44.90,"2026-01",12],["Joli",90.84,"2026-02",10],
   ["EC Novohorizonte",52.60,"2026-01",8],["Mercado Livre AT",22.43,"2026-07",3],
   ["Mercado Livre TI",133.10,"2026-07",3]
  ].forEach(([n,v,ini,dur]) => add("Cartão de Crédito","Parcelamentos","Bruno",n,v,ini,dur,"Cartão Bradesco"));
  [["Jim.com Zuiani Medici",883.35,"2026-07",6],["ZP Mundo 29071",207.92,"2026-07",3]
  ].forEach(([n,v,ini,dur]) => add("Cartão de Crédito","Parcelamentos","Samiah",n,v,ini,dur,"Cartão Bradesco"));

  add("Cartão de Crédito","Compras Variáveis","Bruno","Compras avulsas (gasolina, mercado, restaurante)",3107.48,HOJE_ISO,INF,"Estimativa flat");
  add("Cartão de Crédito","Compras Variáveis","Samiah","Compras avulsas (residual não identificado)",6189.92,HOJE_ISO,INF,"Estimativa flat");
  add("Cartão de Crédito","Compras Variáveis","Nubank (a definir)","Fatura Nubank (sem detalhamento)",7000.00,HOJE_ISO,INF,"Sem discriminação");

  add("Empréstimos","Veículo","Bruno","Honda City 2024 — Santander/Aymoré",2194.82,"2025-04",48,"48 parcelas, 1,54% a.m. — 1º vencimento real 14/04/2025");
  add("Empréstimos","Imóvel","Bruno","Financiamento imobiliário",4166.73,"2012-02",360,"Saldo devedor R$ 331.970,75; início estimado a partir de 174 parcelas já pagas");
  add("Empréstimos","Previbosch","Bruno","Empréstimo Previbosch",2033.78,"2026-04",36,"36 parcelas, 1,10% a.m.");
  add("Empréstimos","Pronampe","Bruno","Empréstimo Pronampe",3128.74,"2025-07",42,"42 parcelas");
  return rows;
}

let ITEMS = [];
let CONFIG = { mode: "local", csvUrl: "", scriptUrl: "", sheetUrl: "", lastSync: null, syncStatus: "" };
let activeYear = 1;
let itensFormOpen = false;
let categoriasFormOpen = false;
let DATA_SOURCE = "mock"; // "mock" | "cache" | "live"
let valuesHidden = false;
function loadValuesHidden() { try { valuesHidden = localStorage.getItem('values-hidden-v1') === '1'; } catch(e) {} }
function saveValuesHidden() { try { localStorage.setItem('values-hidden-v1', valuesHidden ? '1' : '0'); } catch(e) {} }

const fmt = (n) => valuesHidden ? '••••••' : (n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmt0 = (n) => valuesHidden ? '••••' : (n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const pct = (n) => valuesHidden ? '••%' : n;
const esc = (s) => (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function parseCSV(text) {
  const rows = []; let row = []; let field = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field=''; }
      else if (c === '\n') { row.push(field); rows.push(row); row=[]; field=''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(f => f.trim() !== ''));
}
function parseValor(raw) {
  if (typeof raw === 'number') return raw;
  const s = (raw||'0').toString().replace(/[R$\s]/g,'').replace(/\./g,'').replace(',', '.');
  const v = parseFloat(s);
  return isNaN(v) ? (parseFloat(raw)||0) : v;
}
function normalizeDataInicio(raw) {
  if (!raw) return HOJE_ISO;
  const s = raw.toString().trim();
  const m1 = s.match(/^(\d{4})-(\d{2})/); if (m1) return `${m1[1]}-${m1[2]}`;
  const m2 = s.match(/^(\d{1,2})\/(\d{4})/); if (m2) return `${m2[2]}-${m2[1].padStart(2,'0')}`; // dd/mm/yyyy ou mm/yyyy
  const d = new Date(s);
  if (!isNaN(d)) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  return HOJE_ISO;
}

function csvToItems(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const header = rows[0].map(h => h.trim().toLowerCase());
  const idx = (names) => { for (const n of names) { const i = header.indexOf(n); if (i>=0) return i; } return -1; };
  const iId = idx(['id']), iCat = idx(['categoria']), iSub = idx(['subcategoria']),
        iTit = idx(['titular']), iDesc = idx(['descrição','descricao']),
        iVal = idx(['valor mensal (r$)','valor mensal','valor']),
        iIni = idx(['data início','data inicio']), iDur = idx(['duração (meses)','duracao (meses)','duração','duracao']),
        iObs = idx(['observação','observacao']);
  const items = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (iCat < 0 || !row[iCat]) continue;
    items.push({
      id: iId>=0 ? (parseInt(row[iId])||r) : r,
      categoria: row[iCat]?.trim() || '',
      subcategoria: iSub>=0 ? (row[iSub]||'').trim() : '',
      titular: iTit>=0 ? (row[iTit]||'').trim() : '',
      descricao: iDesc>=0 ? (row[iDesc]||'').trim() : '',
      valor: parseValor(row[iVal]),
      dataInicio: iIni>=0 ? normalizeDataInicio(row[iIni]) : HOJE_ISO,
      duracaoMeses: iDur>=0 ? (parseInt(row[iDur])||INF) : INF,
      obs: iObs>=0 ? (row[iObs]||'').trim() : ''
    });
  }
  return items;
}
function jsonRowsToItems(rows) {
  return rows.map((r, i) => ({
    id: Number(r['ID']) || i+1,
    categoria: r['Categoria'] || '',
    subcategoria: r['Subcategoria'] || '',
    titular: r['Titular'] || '',
    descricao: r['Descrição'] || r['Descricao'] || '',
    valor: parseValor(r['Valor Mensal (R$)']),
    dataInicio: normalizeDataInicio(r['Data Início'] || r['Data Inicio']),
    duracaoMeses: Number(r['Duração (Meses)'] || r['Duracao (Meses)']) || INF,
    obs: r['Observação'] || r['Observacao'] || ''
  }));
}
function jsonRowsToHierarchy(rows) {
  const h = {};
  rows.forEach(r => {
    const cat = r['Categoria'], sub = r['Subcategoria'];
    if (!cat) return;
    if (!h[cat]) h[cat] = [];
    if (sub && !h[cat].includes(sub)) h[cat].push(sub);
  });
  return h;
}

async function saveConfig() { try { localStorage.setItem(CONFIG_KEY, JSON.stringify(CONFIG)); } catch(e) { console.error(e); } }
async function loadLocalItems() {

async function saveLocalItems() { try { localStorage.setItem(ITEMS_KEY, JSON.stringify(ITEMS)); } catch(e) { console.error(e); } }
async function loadHierarchy() {

async function saveHierarchy() { try { localStorage.setItem(HIERARCHY_KEY, JSON.stringify(HIERARCHY)); } catch(e) { console.error(e); } }
function refreshTopCats() { TOP_CATS = Object.keys(HIERARCHY); }
async function mergeItemsIntoHierarchy() {
  let changed = false;
  ITEMS.forEach(i => {
    if (!i.categoria) return;
    if (!HIERARCHY[i.categoria]) { HIERARCHY[i.categoria] = []; changed = true; }
    if (i.subcategoria && !HIERARCHY[i.categoria].includes(i.subcategoria)) { HIERARCHY[i.categoria].push(i.subcategoria); changed = true; }
  });
  if (changed) await saveHierarchy();
  refreshTopCats();
}

async function fetchFromCsv() {
  const resp = await fetch(CONFIG.csvUrl, { cache: "no-store" });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const parsed = csvToItems(await resp.text());
  if (!parsed.length) throw new Error("planilha retornou 0 itens");
  return parsed;
}
async function fetchFromScript() {
  const resp = await fetch(CONFIG.scriptUrl, { cache: "no-store" });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const json = await resp.json();
  const rawItems = Array.isArray(json) ? json : (json.items || []);
  const rawCategorias = Array.isArray(json) ? [] : (json.categorias || []);
  const rawInvest = Array.isArray(json) ? [] : (json.investimentos || []);
  const parsed = jsonRowsToItems(rawItems);
  if (!parsed.length) throw new Error("planilha retornou 0 itens");
  if (rawCategorias.length) {
    const fromSheet = jsonRowsToHierarchy(rawCategorias);
    HIERARCHY = { ...HIERARCHY, ...fromSheet };
    Object.keys(fromSheet).forEach(cat => {
      if (!HIERARCHY[cat]) HIERARCHY[cat] = [];
      fromSheet[cat].forEach(sub => { if (!HIERARCHY[cat].includes(sub)) HIERARCHY[cat].push(sub); });
    });
    refreshTopCats();
    await saveHierarchy();
  }
  INVESTIMENTOS = jsonRowsToInvestimentos(rawInvest);
  await saveInvestimentosLocal();
  return parsed;
}
async function postToScript(payload) {
  const resp = await fetch(CONFIG.scriptUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const json = await resp.json();
  if (json.status !== 'ok') throw new Error(json.message || 'erro desconhecido');
  return json;
}
async function trySync() {
  if (CONFIG.mode === 'script-readwrite' && CONFIG.scriptUrl) {
    try { ITEMS = await fetchFromScript(); CONFIG.lastSync = new Date().toISOString(); CONFIG.syncStatus = 'ok'; await saveConfig(); await saveLocalItems(); return true; }
    catch (e) { CONFIG.syncStatus = 'erro: ' + e.message; await saveConfig(); return false; }
  }
  if (CONFIG.mode === 'csv-readonly' && CONFIG.csvUrl) {
    try { ITEMS = await fetchFromCsv(); CONFIG.lastSync = new Date().toISOString(); CONFIG.syncStatus = 'ok'; await saveConfig(); await saveLocalItems(); return true; }
    catch (e) { CONFIG.syncStatus = 'erro: ' + e.message; await saveConfig(); return false; }
  }
  return false;
}

function valueInMonth(item, m) {
  const start = isoToM(item.dataInicio);
  if (item.duracaoMeses >= INF) return m >= start ? item.valor : 0;
  return (m >= start && m < start + item.duracaoMeses) ? item.valor : 0;
}
function itemsOf(cat, sub) { return ITEMS.filter(i => i.categoria===cat && (sub===undefined || i.subcategoria===sub)); }
function catTotal(cat, m) { return itemsOf(cat).reduce((s,i)=>s+valueInMonth(i,m),0); }
function subTotal(cat, sub, m) { return itemsOf(cat,sub).reduce((s,i)=>s+valueInMonth(i,m),0); }
function isIncomeCat(cat) { return /receita/i.test(cat); }
function monthSnapshot(m) {
  const receita = TOP_CATS.filter(isIncomeCat).reduce((s,c)=>s+catTotal(c,m),0);
  const outrasCats = TOP_CATS.filter(c => !isIncomeCat(c));
  let despesasFixas=0, impostos=0, cartoes=0, emprestimos=0, outros=0;
  outrasCats.forEach(c => {
    const t = catTotal(c, m);
    if (/despesas fixas/i.test(c)) despesasFixas += t;
    else if (/imposto/i.test(c)) impostos += t;
    else if (/cart[aã]o/i.test(c)) cartoes += t;
    else if (/empr[eé]stimo/i.test(c)) emprestimos += t;
    else outros += t;
  });
  const saidas = despesasFixas + impostos + cartoes + emprestimos + outros;
  return { m, receita, despesasFixas, impostos, cartoes, emprestimos, outros, saidas, saldo: receita - saidas };
}
function yearSummary(periodo) {
  const { start, end } = PERIODS[periodo - 1];
  const months=[]; for(let m=start;m<=end;m++) months.push(monthSnapshot(m));
  const sum=(k)=>months.reduce((s,r)=>s+r[k],0);
  return { ano: periodo, receita:sum('receita'), despesasFixas:sum('despesasFixas'), impostos:sum('impostos'),
    cartoes:sum('cartoes'), emprestimos:sum('emprestimos'), outros:sum('outros'), saidas:sum('saidas'), saldo:sum('saldo') };
}
function subYearTotal(cat, sub, periodo) {
  const { start, end } = PERIODS[periodo - 1]; let t=0;
  for (let m=start;m<=end;m++) t += subTotal(cat,sub,m);
  return t;
}

async function persistChange(action, item) {
  const note = document.getElementById('save-note');
  try {
    if (CONFIG.mode === 'script-readwrite') {
      if (note) note.textContent = 'gravando na planilha…';
      if (action === 'add') { await postToScript({ action:'add', item }); }
      else if (action === 'update') { await postToScript({ action:'update', id:item.id, item }); }
      else if (action === 'delete') { await postToScript({ action:'delete', id:item.id }); }
      // relê a planilha para confirmar que a gravação realmente aconteceu
      const ok = await trySync();
      if (ok) { DATA_SOURCE = 'live'; await mergeItemsIntoHierarchy(); }
      if (note) note.textContent = ok ? 'salvo na planilha ✓' : ('gravei, mas não consegui confirmar a leitura: ' + CONFIG.syncStatus);
      setTimeout(()=>{ if(note) note.textContent=''; }, ok ? 2000 : 6000);
    } else {
      await saveLocalItems();
      if (note) { note.textContent = 'salvo (local) ✓'; setTimeout(()=>{ if(note) note.textContent=''; }, 1500); }
    }
  } catch (e) {
    if (note) note.textContent = 'erro ao gravar: ' + e.message;
    await saveLocalItems();
  }
  renderAll();
}

    if (isIncome && !/receita/i.test(name)) name = 'Receita — ' + name;
    if (!HIERARCHY[name]) HIERARCHY[name] = [];
    if (!HIERARCHY[name].includes(sub)) HIERARCHY[name].push(sub);
    refreshTopCats();
    await saveHierarchy();
    const note = document.getElementById('save-note-cat');
    if (CONFIG.mode === 'script-readwrite') {
      if (note) note.textContent = 'gravando na planilha…';
      try { await postToScript({ action:'addCategoria', categoria: name, subcategoria: sub, isReceita: isIncome }); }
      catch (e) { if (note) note.textContent = 'criada aqui, mas erro ao gravar na planilha: ' + e.message; renderAll(); return; }
    }
    if (note) { note.textContent = 'criada ✓'; setTimeout(()=>{ if(note) note.textContent=''; }, 1500); }
    renderAll();
  });
  document.getElementById('btn-add-sub').addEventListener('click', async () => {
    const cat = document.getElementById('sub-cat-select').value;
    const sub = document.getElementById('new-sub-name').value.trim();
    if (!sub) return;
    if (!HIERARCHY[cat]) HIERARCHY[cat] = [];
    if (!HIERARCHY[cat].includes(sub)) HIERARCHY[cat].push(sub);
    await saveHierarchy();
    if (CONFIG.mode === 'script-readwrite') {
      try { await postToScript({ action:'addCategoria', categoria: cat, subcategoria: sub, isReceita: isIncomeCat(cat) }); }
      catch (e) { /* fica salvo localmente mesmo se a planilha falhar */ }
    }
    renderAll();
  });
}

let graficoFiltro = { categoria: "TODAS", subcategoria: "TODAS", titular: "TODOS", visao: "mensal" };
let chartInstances = {};
function destroyChart(key) { if (chartInstances[key]) { chartInstances[key].destroy(); delete chartInstances[key]; } }
function distinctTitulares() {
  const set = new Set(ITEMS.map(i => i.titular).filter(Boolean));
  return Array.from(set).sort();
}
function filteredValueAtMonth(m) {
  return ITEMS.filter(i => {
    if (graficoFiltro.categoria !== "TODAS" && i.categoria !== graficoFiltro.categoria) return false;
    if (graficoFiltro.subcategoria !== "TODAS" && i.subcategoria !== graficoFiltro.subcategoria) return false;
    if (graficoFiltro.titular !== "TODOS" && i.titular !== graficoFiltro.titular) return false;
    return true;
  }).reduce((s, i) => s + valueInMonth(i, m), 0);
}
const CHART_COLORS = ["#C9A227","#4C8C6B","#B3431F","#7C8CA6","#8E6BA3","#6FAE8B","#D9714E"];

function renderGraficos() {
  const el = document.getElementById('view-graficos');

  document.getElementById('gf-visao').addEventListener('change', (e) => { graficoFiltro.visao = e.target.value; renderGraficos(); });

  if (typeof Chart === 'undefined') return; // CDN bloqueado/offline — mostra só os filtros

  destroyChart('linha');
  const totalMonths = PERIODS[PERIODS.length-1].end;

    ? Array.from({length: totalMonths}, (_,i) => monthLabel(i+1))

  chartInstances.linha = new Chart(document.getElementById('chart-linha'), {

  destroyChart('saldo');

  chartInstances.saldo = new Chart(document.getElementById('chart-saldo'), {
    type: 'bar',
    data: { labels: saldoLabels, datasets: [{ label: 'Saldo', data: saldoData, backgroundColor: saldoData.map(v => v<0 ? '#D9714E' : '#6FAE8B') }] },
    options: chartOptionsBase(valuesHidden)
  });
}
function chartOptionsBase(hidden) {
  return {
    responsive: true, maintainAspectRatio: false,
    scales: {
      x: { ticks: { color: '#7C8CA6', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.06)' } },
      y: { ticks: { color: '#7C8CA6', font: { size: 10 }, callback: (v) => hidden ? '••' : fmt0(v) }, grid: { color: 'rgba(255,255,255,0.06)' } }
    },
    plugins: { legend: { display: false }, tooltip: chartTooltip(hidden) }
  };
}
function chartTooltip(hidden) {
  return { callbacks: { label: (ctx) => hidden ? '••••••' : `${ctx.dataset.label || ctx.label}: ${fmt(ctx.parsed.y ?? ctx.parsed)}` } };
}

function renderAcoes() {
  const el = document.getElementById('view-acoes');
  const sDez26 = monthSnapshot(6); // Dez/2026, fim deste ano
  const s2anos = monthSnapshot(24); // ~2 anos a partir de agora
  const gap1 = 2000 - sDez26.saldo;
  const gap2 = 5000 - s2anos.saldo;

  // maiores itens discricionários hoje (mês 1), como alavancas de corte
  const discricionarios = ITEMS
    .filter(i => /compras vari|lazer|assinatura/i.test(i.subcategoria) || /compras vari/i.test(i.categoria))
    .filter(i => valueInMonth(i, 1) > 0)
    .sort((a,b) => b.valor - a.valor);
  const totalDiscricionario = discricionarios.reduce((s,i)=>s+i.valor,0);

  function buildActions(gap, prazoLabel) {
    if (gap <= 0) {
      return `<div class="banner ok">Na trajetória atual, o saldo projetado já atinge essa meta — não é necessário cortar nada, mas vale acompanhar mês a mês.</div>`;
    }
    let remaining = gap;
    const picks = [];
    for (const item of discricionarios) {
      if (remaining <= 0) break;
      const cut = Math.min(item.valor * 0.5, remaining); // sugere cortar até 50% de cada item
      if (cut < 5) continue;
      picks.push({ item, cut });
      remaining -= cut;
    }
    const coveredPct = Math.max(0, Math.min(100, ((gap - Math.max(remaining,0)) / gap) * 100));
    let html = `<div class="action-list">`;
    picks.forEach((p, i) => {
      html += `<div class="action-item"><span class="n">${i+1}.</span><div>
        <strong style="color:var(--text-dim)">${esc(p.item.descricao)}</strong> (${esc(p.item.categoria)} &gt; ${esc(p.item.subcategoria)}, ${esc(p.item.titular)})<br>
        <span style="color:var(--text-faint);font-size:12px;">Hoje: ${fmt(p.item.valor)}/mês → cortar ${fmt(p.cut)} (~${Math.round(p.cut/p.item.valor*100)}%)</span>
      </div></div>`;
    });
    if (remaining > 1) {
      html += `<div class="banner info">Mesmo cortando os itens acima, ainda faltam ${fmt(remaining)}/mês para a meta de ${prazoLabel} — vale revisar despesas fixas ou buscar renda extra.</div>`;
    }
    html += `</div>`;
    return html;
  }

  el.innerHTML = `
    <div class="panel">
      <div class="peyebrow">Meta imediata</div>
      <h3>Guardar R$ 2.000/mês até Dezembro/2026</h3>
      <div class="card-grid">
        <div class="action-card"><div class="num" style="color:${sDez26.saldo<0?'#D9714E':'#6FAE8B'}">${fmt(sDez26.saldo)}</div><div class="lbl2">Saldo projetado em Dez/26 (sem mudanças)</div></div>
        <div class="action-card"><div class="num">${fmt(2000)}</div><div class="lbl2">Meta de sobra mensal</div></div>
        <div class="action-card"><div class="num" style="color:${gap1>0?'#D9714E':'#6FAE8B'}">${gap1>0?fmt(gap1):fmt(0)}</div><div class="lbl2">Falta cortar por mês</div></div>
      </div>
      <div style="margin-top:14px;">${buildActions(gap1, 'Dezembro/2026')}</div>
    </div>

    <div class="panel">
      <div class="peyebrow">Meta de médio prazo</div>
      <h3>Guardar R$ 5.000/mês em até 2 anos (${monthLabel(24)})</h3>
      <div class="card-grid">
        <div class="action-card"><div class="num" style="color:${s2anos.saldo<0?'#D9714E':'#6FAE8B'}">${fmt(s2anos.saldo)}</div><div class="lbl2">Saldo projetado em ${monthLabel(24)} (sem mudanças)</div></div>
        <div class="action-card"><div class="num">${fmt(5000)}</div><div class="lbl2">Meta de sobra mensal</div></div>
        <div class="action-card"><div class="num" style="color:${gap2>0?'#D9714E':'#6FAE8B'}">${gap2>0?fmt(gap2):fmt(0)}</div><div class="lbl2">Falta cortar por mês</div></div>
      </div>
      <p style="font-size:12px;color:var(--text-faint);margin-top:10px;">Parte dessa meta já vem de graça: empréstimos e parcelamentos com prazo definido vão saindo do orçamento sozinhos ao longo desses 24 meses — o valor acima já considera isso.</p>
      <div style="margin-top:10px;">${buildActions(gap2, '2 anos')}</div>
    </div>

    <div class="panel">
      <div class="peyebrow">Referência</div>
      <h3>Total discricionário identificado hoje</h3>
      <div class="ledger-row"><span class="lbl b">Compras variáveis + lazer + assinaturas</span><span class="dots"></span><span class="val b">${fmt(totalDiscricionario)}/mês</span></div>
      <p style="font-size:11px;color:var(--text-faint);margin-top:6px;">Sugestões calculadas a partir dos itens atuais dessas subcategorias — cortando até 50% de cada, começando pelos maiores. Ajuste manualmente se algum item não for realmente cortável.</p>
    </div>
  `;
}

const INVEST_KEY = "investimentos-v1";

const TIPOS_INVESTIMENTO = ["Reserva de Emergência","Renda Fixa","Renda Variável","Previdência","Imóvel","Outro"];
async function loadInvestimentosLocal() {

  return false;
}
async function saveInvestimentosLocal() { try { localStorage.setItem(INVEST_KEY, JSON.stringify(INVESTIMENTOS)); } catch(e) {} }
function jsonRowsToInvestimentos(rows) {
  return rows.map((r, i) => ({
    id: Number(r['ID']) || i+1,
    nome: r['Nome'] || '',
    tipo: r['Tipo'] || 'Outro',
    titular: r['Titular'] || '',
    valor: parseValor(r['Valor']),
    data: normalizeDataInicio(r['Data'])
  }));
}
async function persistInvestChange(action, item) {
  if (CONFIG.mode === 'script-readwrite') {
    try {
      if (action === 'add') await postToScript({ action:'addInvest', item });
      else if (action === 'update') await postToScript({ action:'updateInvest', id:item.id, item });
      else if (action === 'delete') await postToScript({ action:'deleteInvest', id:item.id });
      await trySync(); // relê tudo (items + investimentos) pra confirmar
    } catch (e) {
      await saveInvestimentosLocal();
    }
  } else {
    await saveInvestimentosLocal();
  }
}
let investFormOpen = false;

function renderInvestimentos() {
  const el = document.getElementById('view-investimentos');
  const total = INVESTIMENTOS.reduce((s,i)=>s+i.valor,0);
  const porTipo = TIPOS_INVESTIMENTO.map(t => ({ tipo: t, valor: INVESTIMENTOS.filter(i=>i.tipo===t).reduce((s,i)=>s+i.valor,0) })).filter(x=>x.valor>0);

  let html = `<div class="panel">
    <div class="peyebrow">Patrimônio investido</div>
    <div class="inv-total">${fmt(total)}</div>
  </div>`;

  if (porTipo.length) {
    html += `<div class="panel"><h3>Alocação por tipo</h3><div class="chart-wrap short"><canvas id="chart-invest-tipo"></canvas></div></div>`;
    html += `<div class="panel"><h3>Acumulado ao longo do tempo</h3><div class="chart-wrap short"><canvas id="chart-invest-tempo"></canvas></div></div>`;
  }

  html += `<div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <h3 style="margin:0;">Lançamentos</h3>
      <button class="btn" id="toggle-add-invest" type="button">${investFormOpen ? 'Fechar' : '+ Adicionar Investimento'}</button>
    </div>
    ${investFormOpen ? `
    <div class="item-form" style="margin-top:12px;">
      <div class="field"><label>Nome</label><input type="text" id="new-inv-nome" placeholder="Ex: Tesouro Selic"></div>
      <div class="field"><label>Tipo</label><select id="new-inv-tipo">${TIPOS_INVESTIMENTO.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
      <div class="field"><label>Titular</label><input type="text" id="new-inv-titular" placeholder="Bruno / Samiah / Família"></div>
      <div class="field"><label>Valor (R$)</label><input type="number" step="0.01" id="new-inv-valor" placeholder="0,00"></div>
      <div class="field"><label>Data</label><input type="month" id="new-inv-data" value="${HOJE_ISO}"></div>
    </div>
    <div style="margin-top:10px;"><button class="btn" id="btn-add-invest">+ Adicionar</button></div>
    ` : ''}
  </div>`;

  if (INVESTIMENTOS.length) {
    html += `<div class="panel"><div class="tablewrap"><table>
      <thead><tr><th class="l">Nome</th><th class="l">Tipo</th><th class="l">Titular</th><th>Valor</th><th>Data</th><th></th></tr></thead>
      <tbody>${INVESTIMENTOS.slice().sort((a,b)=>b.data.localeCompare(a.data)).map(i => `
        <tr><td class="l">${esc(i.nome)}</td><td class="l">${esc(i.tipo)}</td><td class="l">${esc(i.titular)}</td><td>${fmt(i.valor)}</td><td>${monthLabel(isoToM(i.data))}</td>
        <td><button class="btn danger" data-del-inv="${i.id}">remover</button></td></tr>
      `).join('')}</tbody>
    </table></div></div>`;
  } else {
    html += `<div class="banner info">Nenhum investimento cadastrado ainda.</div>`;
  }

  el.innerHTML = html;

  const toggleBtn = document.getElementById('toggle-add-invest');
  if (toggleBtn) toggleBtn.addEventListener('click', () => { investFormOpen = !investFormOpen; renderInvestimentos(); });
  const addBtn = document.getElementById('btn-add-invest');
  if (addBtn) addBtn.addEventListener('click', async () => {
    const nome = document.getElementById('new-inv-nome').value || '(sem nome)';
    const tipo = document.getElementById('new-inv-tipo').value;
    const titular = document.getElementById('new-inv-titular').value || 'Família';
    const valor = parseFloat(document.getElementById('new-inv-valor').value) || 0;
    const data = document.getElementById('new-inv-data').value || HOJE_ISO;
    const id = INVESTIMENTOS.length ? Math.max(...INVESTIMENTOS.map(i=>i.id))+1 : 1;
    const item = { id, nome, tipo, titular, valor, data };
    INVESTIMENTOS.push(item);
    await persistInvestChange('add', item);
    renderInvestimentos();
  });
  el.querySelectorAll('[data-del-inv]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const id = parseInt(e.target.dataset.delInv);
      INVESTIMENTOS = INVESTIMENTOS.filter(i=>i.id!==id);
      await persistInvestChange('delete', { id });
      renderInvestimentos();
    });
  });

  if (typeof Chart === 'undefined' || !porTipo.length) return;
  destroyChart('investTipo');
  chartInstances.investTipo = new Chart(document.getElementById('chart-invest-tipo'), {
    type: 'doughnut',
    data: { labels: porTipo.map(x=>x.tipo), datasets: [{ data: porTipo.map(x=>x.valor), backgroundColor: CHART_COLORS, borderColor: '#16233A', borderWidth: 2 }] },
    options: { ...chartOptionsBase(valuesHidden), plugins: { legend: { position: 'bottom', labels: { color: '#B7C0CE', font: { size: 11 } } }, tooltip: chartTooltip(valuesHidden) } }
  });
  destroyChart('investTempo');
  const sorted = INVESTIMENTOS.slice().sort((a,b)=>a.data.localeCompare(b.data));
  let acc = 0;
  const tempoLabels = sorted.map(i => monthLabel(isoToM(i.data)));
  const tempoData = sorted.map(i => { acc += i.valor; return acc; });
  chartInstances.investTempo = new Chart(document.getElementById('chart-invest-tempo'), {
    type: 'line',
    data: { labels: tempoLabels, datasets: [{ label: 'Acumulado', data: tempoData, borderColor: '#C9A227', backgroundColor: 'rgba(201,162,39,0.15)', fill: true, tension: 0.2 }] },
    options: chartOptionsBase(valuesHidden)
  });
}

function renderAll() { renderDataSourceBanner(); renderGeral(); renderItens(); renderCategorias(); renderMensal(); renderAnual(); renderGraficos(); renderAcoes(); renderInvestimentos(); renderSync(); renderModeSubtext(); }

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('view-'+t.dataset.view).classList.add('active');
  });
});

function renderToggleValuesBtn() {
  const btn = document.getElementById('toggle-values');
  if (btn) btn.textContent = valuesHidden ? '🙈 Mostrar valores' : '👁 Ocultar valores';
}
document.getElementById('toggle-values').addEventListener('click', () => {
  valuesHidden = !valuesHidden;
  saveValuesHidden();
  renderToggleValuesBtn();
  renderAll();
});

(async function init() {
  loadValuesHidden();
  renderToggleValuesBtn();
  await loadConfig();
  await loadHierarchy();
  refreshTopCats();
  let synced = false;
  if (CONFIG.mode !== 'local') {
    synced = await trySync();
    if (synced) {
      DATA_SOURCE = 'live';
    } else {
      const hadLocal = await loadLocalItems();
      if (hadLocal) { DATA_SOURCE = 'cache'; }
      else { ITEMS = seedItems(); await saveLocalItems(); DATA_SOURCE = 'mock'; }
      await loadInvestimentosLocal();
    }
  } else {
    const hadLocal = await loadLocalItems();
    if (!hadLocal) { ITEMS = seedItems(); await saveLocalItems(); }
    DATA_SOURCE = 'live'; // modo local intencional — o que estiver aqui é o dado real deste modo
    await loadInvestimentosLocal();
  }
  await mergeItemsIntoHierarchy();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('view-geral').style.display = '';
  renderAll();
})();
</script>
</body>
