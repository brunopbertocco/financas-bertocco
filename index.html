<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Família Bertocco — Painel de Finanças</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');
:root {
  --bg:#0E1A2B; --panel:#16233A; --panel-alt:#101C2E; --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.18); --text:#F4F1E8; --text-dim:#DCE1E8; --text-muted:#B7C0CE;
  --text-faint:#7C8CA6; --gold:#C9A227; --green:#6FAE8B; --red:#D9714E;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; background:var(--bg); color:var(--text-dim); font-family:'Inter',sans-serif; font-size:14px; }
.wrap { max-width:1100px; margin:0 auto; padding:20px 16px 60px; }
h1 { font-family:'Source Serif 4',serif; color:var(--text); font-size:24px; margin:4px 0 2px; }
.eyebrow { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); }
.subtext { color:var(--text-faint); font-size:12px; margin-bottom:16px; }
.tabs { display:flex; gap:2px; margin-bottom:18px; flex-wrap:wrap; border-bottom:1px solid var(--border); -webkit-overflow-scrolling:touch; }
.tab { padding:10px 13px; font-size:12.5px; cursor:pointer; color:var(--text-faint); border-bottom:2px solid transparent; font-weight:500; user-select:none; white-space:nowrap; }
.tab.active { color:var(--text); border-bottom-color:var(--gold); font-weight:600; }
.view { display:none; flex-direction:column; gap:16px; }
.view.active { display:flex; }
.panel { background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:15px 16px 18px; }
.panel h3 { font-family:'Source Serif 4',serif; color:var(--text); font-size:16px; margin:4px 0 10px; font-weight:600; }
.peyebrow { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-faint); margin-bottom:2px; }
.kpi-row { display:flex; gap:10px; flex-wrap:wrap; }
.kpi { flex:1; min-width:140px; background:var(--panel-alt); border:1px solid var(--border); border-radius:4px; padding:11px 13px; }
.kpi .label { font-size:9.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); margin-bottom:4px; }
.kpi .value { font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; color:var(--text); }
.kpi .value.bad { color:var(--red); } .kpi .value.good { color:var(--green); }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:right; padding:6px 7px; font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-faint); border-bottom:1px solid var(--border-strong); white-space:nowrap; font-weight:500; }
th.l, td.l { text-align:left; }
td { text-align:right; padding:5px 7px; font-family:'IBM Plex Mono',monospace; color:var(--text-dim); border-bottom:1px solid var(--border); white-space:nowrap; }
tr:hover td { background:rgba(255,255,255,0.02); }
.bold { font-weight:600; color:var(--gold) !important; }
.tablewrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.cat-title { display:flex; justify-content:space-between; align-items:baseline; margin-top:14px; margin-bottom:4px; }
.cat-title span.name { font-family:'Source Serif 4',serif; color:var(--text); font-size:15px; font-weight:600; }
.ledger-row { display:flex; align-items:baseline; gap:8px; padding:6px 0; }
.ledger-row .lbl { color:var(--text-muted); font-size:12.5px; flex-shrink:0; }
.ledger-row .lbl.b { color:var(--text); font-weight:600; font-size:13.5px; }
.ledger-row .dots { flex:1; border-bottom:1px dotted var(--border-strong); transform:translateY(-4px); margin:0 4px; }
.ledger-row .val { font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--text-dim); flex-shrink:0; }
.ledger-row .val.b { color:var(--gold); font-weight:600; font-size:13.5px; }
.btn { background:var(--gold); color:var(--bg); border:none; border-radius:4px; padding:10px 16px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
.btn.secondary { background:var(--panel-alt); color:var(--text-muted); border:1px solid var(--border); }
.btn.danger { background:rgba(217,113,78,0.15); color:var(--red); border:1px solid rgba(217,113,78,0.4); padding:5px 9px; font-size:11px; }
.btn:disabled { opacity:0.5; cursor:default; }
.btn:active:not(:disabled) { opacity:0.85; }
.item-form { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; align-items:end; margin-top:10px; }
.item-form .field { display:flex; flex-direction:column; gap:4px; }
.item-form label { font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.06em; }
.item-form input, .item-form select { background:var(--panel-alt); border:1px solid var(--border-strong); color:var(--text-dim); padding:9px 8px; border-radius:4px; font-size:13px; font-family:'Inter',sans-serif; }
.item-form input:focus, .item-form select:focus { outline:1px solid var(--gold); }
@media (max-width:640px) { .item-form { grid-template-columns:1fr 1fr; } }
.item-row select, .item-row input { background:transparent; border:1px solid transparent; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; font-size:12px; padding:4px; border-radius:2px; width:100%; }
.item-row input[type=text] { font-family:'Inter',sans-serif; }
.item-row select:hover, .item-row input:hover { border-color:var(--border-strong); }
.item-row select:focus, .item-row input:focus { border-color:var(--gold); outline:none; background:var(--panel-alt); }
.badge { font-size:10px; padding:2px 7px; border-radius:10px; background:rgba(201,162,39,0.12); color:var(--gold); border:1px solid rgba(201,162,39,0.3); }
.badge.sync { background:rgba(111,174,139,0.12); color:var(--green); border-color:rgba(111,174,139,0.35); }
.badge.ro { background:rgba(124,140,166,0.12); color:var(--text-faint); border-color:rgba(124,140,166,0.35); }
.badge.income { background:rgba(111,174,139,0.15); color:var(--green); border-color:rgba(111,174,139,0.4); }
.year-btns { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:12px; }
.year-btn { padding:7px 13px; font-size:12px; border-radius:4px; border:1px solid var(--border); background:var(--panel-alt); color:var(--text-muted); cursor:pointer; }
.year-btn.active { background:var(--gold); color:var(--bg); font-weight:600; }
.saved-note { font-size:11px; color:var(--text-faint); }
.loading { padding:40px; text-align:center; color:var(--text-faint); }
.banner { border-radius:4px; padding:12px 14px; font-size:12.5px; display:flex; gap:10px; align-items:flex-start; }
.banner.info { background:rgba(201,162,39,0.08); border:1px solid rgba(201,162,39,0.3); color:#E3CE97; }
.banner.ok { background:rgba(111,174,139,0.08); border:1px solid rgba(111,174,139,0.3); color:#B9D9C8; }
.banner.err { background:rgba(217,113,78,0.08); border:1px solid rgba(217,113,78,0.3); color:#E3B9A8; }
.step { margin:6px 0; padding-left:18px; }
code, pre { background:var(--panel-alt); border-radius:3px; font-family:'IBM Plex Mono',monospace; }
code { padding:1px 5px; font-size:11.5px; }
a { color:var(--gold); }
.radio-group { display:flex; gap:14px; margin-bottom:10px; flex-wrap:wrap; }
.radio-group label { font-size:12.5px; color:var(--text-muted); display:flex; align-items:center; gap:5px; cursor:pointer; }
.quick-row { display:flex; gap:8px; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Painel de Finanças</div>
  <h1>Família Bertocco</h1>
  <div class="subtext" id="mode-subtext">Carregando…</div>

  <div class="tabs">
    <div class="tab active" data-view="geral">Visão Geral</div>
    <div class="tab" data-view="itens">Itens</div>
    <div class="tab" data-view="categorias">Categorias</div>
    <div class="tab" data-view="mensal">Mensal</div>
    <div class="tab" data-view="anual">Anual</div>
    <div class="tab" data-view="sync">Sincronização</div>
  </div>

  <div id="loading" class="loading">Carregando dados…</div>
  <div class="view active" id="view-geral" style="display:none;"></div>
  <div class="view" id="view-itens"></div>
  <div class="view" id="view-categorias"></div>
  <div class="view" id="view-mensal"></div>
  <div class="view" id="view-anual"></div>
  <div class="view" id="view-sync"></div>
</div>

<script>
const INF = 999;
const ITEMS_KEY = "items-v3";
const CONFIG_KEY = "sheet-config-v2";
const HIERARCHY_KEY = "hierarchy-v1";

// Hoje = 17/07/2026 → mês 1 do horizonte é Jul/2026 (mês atual)
const ANCHOR_YEAR = 2026, ANCHOR_MONTH0 = 6; // 0-indexado: Jul = 6
const MESES_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function monthLabel(m) {
  const am = ANCHOR_MONTH0 + (m - 1);
  const year = ANCHOR_YEAR + Math.floor(am / 12);
  const month = ((am % 12) + 12) % 12;
  return `${MESES_PT[month]}/${String(year).slice(2)}`;
}
// Períodos alinhados ao calendário: 1º = Jul–Dez/26 (6 meses), os demais = ano civil completo
const PERIODS = [
  { start: 1, end: 6 },
  { start: 7, end: 18 },
  { start: 19, end: 30 },
  { start: 31, end: 42 },
  { start: 43, end: 54 },
];
function yearLabel(p) {
  const { start, end } = PERIODS[p - 1];
  return `${monthLabel(start)}–${monthLabel(end)}`;
}
// "2026-08" -> índice de mês (1 = Jul/2026)
function isoToM(iso) {
  if (!iso) return 1;
  const [y, mo] = iso.split('-').map(Number);
  const am = (y - ANCHOR_YEAR) * 12 + (mo - 1);
  return am - ANCHOR_MONTH0 + 1;
}
// índice de mês -> "2026-08"
function mToIso(m) {
  const am = ANCHOR_MONTH0 + (m - 1);
  const year = ANCHOR_YEAR + Math.floor(am / 12);
  const month0 = ((am % 12) + 12) % 12;
  return `${year}-${String(month0 + 1).padStart(2,'0')}`;
}
const HOJE_ISO = mToIso(1);

const DEFAULT_HIERARCHY = {
  "Receita": ["Bruno","Samiah"],
  "Despesas Fixas": ["Moradia","Utilidades","Saúde","Transporte","Lazer/Bem-estar"],
  "Impostos": ["Bruno","Samiah (PJ)"],
  "Cartão de Crédito": ["Assinaturas","Parcelamentos","Compras Variáveis"],
  "Empréstimos": ["Veículo","Imóvel","Previbosch","Pronampe"]
};
let HIERARCHY = {};
let TOP_CATS = [];

function seedItems() {
  const rows = []; let id = 1;
  const add = (categoria, subcategoria, titular, descricao, valor, dataInicio, duracaoMeses, obs) =>
    rows.push({ id: id++, categoria, subcategoria, titular, descricao, valor, dataInicio, duracaoMeses, obs: obs||"" });

  add("Receita","Bruno","Bruno","Salário Bruno",20777.22,HOJE_ISO,INF,"Receita bruta");
  add("Receita","Samiah","Samiah","Salário/Pró-labore Samiah",20284.00,HOJE_ISO,INF,"Receita bruta");
  [["Moradia","Condomínio",1000],["Moradia","IPTU",390],["Utilidades","Energia",160],
   ["Utilidades","Água",150],["Utilidades","Gás",80],["Utilidades","Vivo (internet + celular)",400],
   ["Saúde","Dentista filha",240],["Transporte","Sem Parar",80],["Transporte","Estacionamento Samiah",260],
   ["Lazer/Bem-estar","Flow Academia",250],["Lazer/Bem-estar","Vinhos",400],["Lazer/Bem-estar","Jazz",180]
  ].forEach(([sub,n,v]) => add("Despesas Fixas",sub,"Família",n,v,HOJE_ISO,INF));
  add("Impostos","Bruno","Bruno","INSS",951.62,HOJE_ISO,INF);
  add("Impostos","Bruno","Bruno","IRPF",4439.04,HOJE_ISO,INF);
  add("Impostos","Bruno","Bruno","Seguro de vida",84.40,HOJE_ISO,INF);
  add("Impostos","Samiah (PJ)","Samiah","INSS (PJ)",502.51,HOJE_ISO,INF);
  add("Impostos","Samiah (PJ)","Samiah","DAS (PJ)",1128.50,HOJE_ISO,INF);
  [["Apple (iCloud)",9.99],["Terra Brasil",57.42],["Amazon Prime Canais",29.90],
   ["Amazon Prime (membership)",19.90],["Anthropic Claude (+IOF)",113.85],
   ["Netflix",44.90],["JusBrasil",58.90],["Globoplay",27.90]
  ].forEach(([n,v]) => add("Cartão de Crédito","Assinaturas","Bruno",n,v,HOJE_ISO,INF,"Cartão Bradesco"));
  [["ChatGPT / OpenAI",107.60],["Disney Plus",26.50],["Leiturinha",53.60]
  ].forEach(([n,v]) => add("Cartão de Crédito","Assinaturas","Samiah",n,v,HOJE_ISO,INF,"Cartão Bradesco"));

  // Parcelamentos: datas reais de início derivadas das faturas
  [["Amazon Diego Pereira",39.95,"2026-07",2],["Amazon Topsystem",132.31,"2026-06",12],
   ["Amazon CPI (Amazon BR)",36.38,"2026-06",12],["Ophicinales Farmácia",85.29,"2026-05",6],
   ["Bradesco Auto (seguro)",91.99,"2026-05",10],["Armário Sophie",144.21,"2026-04",10],
   ["Surfco",53.94,"2026-04",5],["Zeiss Vinhedo (óculos)",444.66,"2026-04",6],
   ["Zurich Seguros",182.29,"2026-03",12],["HTM Lancheira Juju",19.66,"2026-02",12],
   ["International School",166.61,"2026-02",12],["Assiny Katon Tecnologia",38.16,"2026-02",10],
   ["Globoplay (parcelado)",44.90,"2026-01",12],["Joli",90.84,"2026-02",10],
   ["EC Novohorizonte",52.60,"2026-01",8],["Mercado Livre AT",22.43,"2026-07",3],
   ["Mercado Livre TI",133.10,"2026-07",3]
  ].forEach(([n,v,ini,dur]) => add("Cartão de Crédito","Parcelamentos","Bruno",n,v,ini,dur,"Cartão Bradesco"));
  [["Jim.com Zuiani Medici",883.35,"2026-07",6],["ZP Mundo 29071",207.92,"2026-07",3]
  ].forEach(([n,v,ini,dur]) => add("Cartão de Crédito","Parcelamentos","Samiah",n,v,ini,dur,"Cartão Bradesco"));

  add("Cartão de Crédito","Compras Variáveis","Bruno","Compras avulsas (gasolina, mercado, restaurante)",3107.48,HOJE_ISO,INF,"Estimativa flat");
  add("Cartão de Crédito","Compras Variáveis","Samiah","Compras avulsas (residual não identificado)",6189.92,HOJE_ISO,INF,"Estimativa flat");
  add("Cartão de Crédito","Compras Variáveis","Nubank (a definir)","Fatura Nubank (sem detalhamento)",7000.00,HOJE_ISO,INF,"Sem discriminação");

  add("Empréstimos","Veículo","Bruno","Honda City 2024 — Santander/Aymoré",2194.82,"2025-04",48,"48 parcelas, 1,54% a.m. — 1º vencimento real 14/04/2025");
  add("Empréstimos","Imóvel","Bruno","Financiamento imobiliário",4166.73,"2012-02",360,"Saldo devedor R$ 331.970,75; início estimado a partir de 174 parcelas já pagas");
  add("Empréstimos","Previbosch","Bruno","Empréstimo Previbosch",2033.78,"2026-04",36,"36 parcelas, 1,10% a.m.");
  add("Empréstimos","Pronampe","Bruno","Empréstimo Pronampe",3128.74,"2025-07",42,"42 parcelas");
  return rows;
}

let ITEMS = [];
let CONFIG = { mode: "local", csvUrl: "", scriptUrl: "", sheetUrl: "", lastSync: null, syncStatus: "" };
let activeYear = 1;
let itensFormOpen = false;
let categoriasFormOpen = false;

const fmt = (n) => (n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmt0 = (n) => (n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const esc = (s) => (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function parseCSV(text) {
  const rows = []; let row = []; let field = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field=''; }
      else if (c === '\n') { row.push(field); rows.push(row); row=[]; field=''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(f => f.trim() !== ''));
}
function parseValor(raw) {
  if (typeof raw === 'number') return raw;
  const s = (raw||'0').toString().replace(/[R$\s]/g,'').replace(/\./g,'').replace(',', '.');
  const v = parseFloat(s);
  return isNaN(v) ? (parseFloat(raw)||0) : v;
}
function normalizeDataInicio(raw) {
  if (!raw) return HOJE_ISO;
  const s = raw.toString().trim();
  const m1 = s.match(/^(\d{4})-(\d{2})/); if (m1) return `${m1[1]}-${m1[2]}`;
  const m2 = s.match(/^(\d{1,2})\/(\d{4})/); if (m2) return `${m2[2]}-${m2[1].padStart(2,'0')}`; // dd/mm/yyyy ou mm/yyyy
  const d = new Date(s);
  if (!isNaN(d)) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  return HOJE_ISO;
}

function csvToItems(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const header = rows[0].map(h => h.trim().toLowerCase());
  const idx = (names) => { for (const n of names) { const i = header.indexOf(n); if (i>=0) return i; } return -1; };
  const iId = idx(['id']), iCat = idx(['categoria']), iSub = idx(['subcategoria']),
        iTit = idx(['titular']), iDesc = idx(['descrição','descricao']),
        iVal = idx(['valor mensal (r$)','valor mensal','valor']),
        iIni = idx(['data início','data inicio']), iDur = idx(['duração (meses)','duracao (meses)','duração','duracao']),
        iObs = idx(['observação','observacao']);
  const items = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (iCat < 0 || !row[iCat]) continue;
    items.push({
      id: iId>=0 ? (parseInt(row[iId])||r) : r,
      categoria: row[iCat]?.trim() || '',
      subcategoria: iSub>=0 ? (row[iSub]||'').trim() : '',
      titular: iTit>=0 ? (row[iTit]||'').trim() : '',
      descricao: iDesc>=0 ? (row[iDesc]||'').trim() : '',
      valor: parseValor(row[iVal]),
      dataInicio: iIni>=0 ? normalizeDataInicio(row[iIni]) : HOJE_ISO,
      duracaoMeses: iDur>=0 ? (parseInt(row[iDur])||INF) : INF,
      obs: iObs>=0 ? (row[iObs]||'').trim() : ''
    });
  }
  return items;
}
function jsonRowsToItems(rows) {
  return rows.map((r, i) => ({
    id: Number(r['ID']) || i+1,
    categoria: r['Categoria'] || '',
    subcategoria: r['Subcategoria'] || '',
    titular: r['Titular'] || '',
    descricao: r['Descrição'] || r['Descricao'] || '',
    valor: parseValor(r['Valor Mensal (R$)']),
    dataInicio: normalizeDataInicio(r['Data Início'] || r['Data Inicio']),
    duracaoMeses: Number(r['Duração (Meses)'] || r['Duracao (Meses)']) || INF,
    obs: r['Observação'] || r['Observacao'] || ''
  }));
}

async function loadConfig() {
  try { const res = await window.storage.get(CONFIG_KEY, false); if (res && res.value) CONFIG = { ...CONFIG, ...JSON.parse(res.value) }; }
  catch(e) { /* none yet */ }
}
async function saveConfig() { try { await window.storage.set(CONFIG_KEY, JSON.stringify(CONFIG), false); } catch(e) { console.error(e); } }
async function loadLocalItems() {
  try { const res = await window.storage.get(ITEMS_KEY, false); if (res && res.value) { ITEMS = JSON.parse(res.value); return true; } }
  catch(e) { /* none */ }
  return false;
}
async function saveLocalItems() { try { await window.storage.set(ITEMS_KEY, JSON.stringify(ITEMS), false); } catch(e) { console.error(e); } }
async function loadHierarchy() {
  try { const res = await window.storage.get(HIERARCHY_KEY, false); if (res && res.value) { HIERARCHY = JSON.parse(res.value); return; } }
  catch(e) { /* none */ }
  HIERARCHY = JSON.parse(JSON.stringify(DEFAULT_HIERARCHY));
  await saveHierarchy();
}
async function saveHierarchy() { try { await window.storage.set(HIERARCHY_KEY, JSON.stringify(HIERARCHY), false); } catch(e) { console.error(e); } }
function refreshTopCats() { TOP_CATS = Object.keys(HIERARCHY); }
async function mergeItemsIntoHierarchy() {
  let changed = false;
  ITEMS.forEach(i => {
    if (!i.categoria) return;
    if (!HIERARCHY[i.categoria]) { HIERARCHY[i.categoria] = []; changed = true; }
    if (i.subcategoria && !HIERARCHY[i.categoria].includes(i.subcategoria)) { HIERARCHY[i.categoria].push(i.subcategoria); changed = true; }
  });
  if (changed) await saveHierarchy();
  refreshTopCats();
}

async function fetchFromCsv() {
  const resp = await fetch(CONFIG.csvUrl, { cache: "no-store" });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const parsed = csvToItems(await resp.text());
  if (!parsed.length) throw new Error("planilha retornou 0 itens");
  return parsed;
}
async function fetchFromScript() {
  const resp = await fetch(CONFIG.scriptUrl, { cache: "no-store" });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const json = await resp.json();
  const parsed = jsonRowsToItems(json);
  if (!parsed.length) throw new Error("planilha retornou 0 itens");
  return parsed;
}
async function postToScript(payload) {
  const resp = await fetch(CONFIG.scriptUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const json = await resp.json();
  if (json.status !== 'ok') throw new Error(json.message || 'erro desconhecido');
  return json;
}
async function trySync() {
  if (CONFIG.mode === 'script-readwrite' && CONFIG.scriptUrl) {
    try { ITEMS = await fetchFromScript(); CONFIG.lastSync = new Date().toISOString(); CONFIG.syncStatus = 'ok'; await saveConfig(); await saveLocalItems(); return true; }
    catch (e) { CONFIG.syncStatus = 'erro: ' + e.message; await saveConfig(); return false; }
  }
  if (CONFIG.mode === 'csv-readonly' && CONFIG.csvUrl) {
    try { ITEMS = await fetchFromCsv(); CONFIG.lastSync = new Date().toISOString(); CONFIG.syncStatus = 'ok'; await saveConfig(); await saveLocalItems(); return true; }
    catch (e) { CONFIG.syncStatus = 'erro: ' + e.message; await saveConfig(); return false; }
  }
  return false;
}

function valueInMonth(item, m) {
  const start = isoToM(item.dataInicio);
  if (item.duracaoMeses >= INF) return m >= start ? item.valor : 0;
  return (m >= start && m < start + item.duracaoMeses) ? item.valor : 0;
}
function itemsOf(cat, sub) { return ITEMS.filter(i => i.categoria===cat && (sub===undefined || i.subcategoria===sub)); }
function catTotal(cat, m) { return itemsOf(cat).reduce((s,i)=>s+valueInMonth(i,m),0); }
function subTotal(cat, sub, m) { return itemsOf(cat,sub).reduce((s,i)=>s+valueInMonth(i,m),0); }
function isIncomeCat(cat) { return /receita/i.test(cat); }
function monthSnapshot(m) {
  const receita = TOP_CATS.filter(isIncomeCat).reduce((s,c)=>s+catTotal(c,m),0);
  const outrasCats = TOP_CATS.filter(c => !isIncomeCat(c));
  let despesasFixas=0, impostos=0, cartoes=0, emprestimos=0, outros=0;
  outrasCats.forEach(c => {
    const t = catTotal(c, m);
    if (/despesas fixas/i.test(c)) despesasFixas += t;
    else if (/imposto/i.test(c)) impostos += t;
    else if (/cart[aã]o/i.test(c)) cartoes += t;
    else if (/empr[eé]stimo/i.test(c)) emprestimos += t;
    else outros += t;
  });
  const saidas = despesasFixas + impostos + cartoes + emprestimos + outros;
  return { m, receita, despesasFixas, impostos, cartoes, emprestimos, outros, saidas, saldo: receita - saidas };
}
function yearSummary(periodo) {
  const { start, end } = PERIODS[periodo - 1];
  const months=[]; for(let m=start;m<=end;m++) months.push(monthSnapshot(m));
  const sum=(k)=>months.reduce((s,r)=>s+r[k],0);
  return { ano: periodo, receita:sum('receita'), despesasFixas:sum('despesasFixas'), impostos:sum('impostos'),
    cartoes:sum('cartoes'), emprestimos:sum('emprestimos'), outros:sum('outros'), saidas:sum('saidas'), saldo:sum('saldo') };
}
function subYearTotal(cat, sub, periodo) {
  const { start, end } = PERIODS[periodo - 1]; let t=0;
  for (let m=start;m<=end;m++) t += subTotal(cat,sub,m);
  return t;
}

async function persistChange(action, item) {
  const note = document.getElementById('save-note');
  try {
    if (CONFIG.mode === 'script-readwrite') {
      if (note) note.textContent = 'gravando na planilha…';
      if (action === 'add') { const r = await postToScript({ action:'add', item }); const local = ITEMS.find(i=>i.id===item.id); if (local) local.id = r.id; }
      else if (action === 'update') { await postToScript({ action:'update', id:item.id, item }); }
      else if (action === 'delete') { await postToScript({ action:'delete', id:item.id }); }
      await saveLocalItems();
      if (note) { note.textContent = 'salvo na planilha ✓'; setTimeout(()=>{ if(note) note.textContent=''; }, 2000); }
    } else {
      await saveLocalItems();
      if (note) { note.textContent = 'salvo (local) ✓'; setTimeout(()=>{ if(note) note.textContent=''; }, 1500); }
    }
  } catch (e) {
    if (note) note.textContent = 'erro ao gravar: ' + e.message;
    await saveLocalItems();
  }
  await mergeItemsIntoHierarchy();
  renderAll();
}

        const vals=[1,2,3,4,5].map(a=>subYearTotal(cat,sub,a));
        const delta=vals[4]-vals[0];
        return `<tr><td class="l">${sub}</td>${vals.map(v=>`<td>${fmt0(v)}</td>`).join('')}<td style="color:${delta===0?'#7C8CA6':(delta<0?'#6FAE8B':'#D9714E')}">${delta>=0?'+':''}${fmt0(delta)}</td></tr>`;
      }).join('')}</tbody></table></div></div>`;
  });
  el.innerHTML = html;
}

function renderSync() {
  const el = document.getElementById('view-sync');
  el.innerHTML = `
    <div class="panel">
      <div class="peyebrow">Modo de sincronização</div>
      <h3>Como este painel se conecta à planilha</h3>
      <div class="radio-group">
        <label><input type="radio" name="mode" value="local" ${CONFIG.mode==='local'?'checked':''}> Local (sem planilha)</label>
        <label><input type="radio" name="mode" value="csv-readonly" ${CONFIG.mode==='csv-readonly'?'checked':''}> Google Sheets — somente leitura</label>
        <label><input type="radio" name="mode" value="script-readwrite" ${CONFIG.mode==='script-readwrite'?'checked':''}> Google Sheets — leitura e escrita ✓ recomendado</label>
      </div>
      <div class="item-form" style="grid-template-columns:1fr;">
        <div class="field"><label>URL do Apps Script (Web App, termina em /exec)</label>
          <input type="text" id="script-url" placeholder="https://script.google.com/macros/s/AKfycb.../exec" value="${esc(CONFIG.scriptUrl)}"></div>
        <div class="field"><label>URL do CSV publicado (modo somente leitura)</label>
          <input type="text" id="csv-url" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv" value="${esc(CONFIG.csvUrl)}"></div>
        <div class="field"><label>Link da planilha (atalho, opcional)</label>
          <input type="text" id="sheet-url" placeholder="https://docs.google.com/spreadsheets/d/..." value="${esc(CONFIG.sheetUrl)}"></div>
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn" id="btn-sync-save">Salvar e Sincronizar Agora</button>
        ${CONFIG.sheetUrl ? `<a href="${esc(CONFIG.sheetUrl)}" target="_blank" class="btn secondary" style="text-decoration:none;display:inline-flex;align-items:center;">Abrir planilha</a>` : ''}
      </div>
      <div id="sync-status" style="margin-top:12px;"></div>
    </div>
    <div class="panel">
      <div class="peyebrow">Recomendado</div>
      <h3>Configurar leitura e escrita (Apps Script)</h3>
      <div class="step">1. Planilha → <code>Extensões → Apps Script</code>.</div>
      <div class="step">2. Apague o código padrão, cole o conteúdo de <code>apps-script-api.gs.txt</code>.</div>
      <div class="step">3. Salve o projeto.</div>
      <div class="step">4. <code>Implantar → Nova implantação</code> → tipo <code>App da Web</code>.</div>
      <div class="step">5. Executar como: <b>Eu</b>. Quem acessa: <b>Qualquer pessoa</b>.</div>
      <div class="step">6. Implantar → autorize → copie a URL (<code>/exec</code>) → cole acima → escolha o modo leitura/escrita → Sincronizar.</div>
      <div class="banner err" style="margin-top:10px;">Essa URL permite ler e editar a planilha para quem a tiver. Não compartilhe fora da família.</div>
    </div>
  `;
  const statusEl = document.getElementById('sync-status');
  if (CONFIG.lastSync) statusEl.innerHTML = `<div class="banner ${CONFIG.syncStatus==='ok'?'ok':'err'}">Última sincronização: ${new Date(CONFIG.lastSync).toLocaleString('pt-BR')} — status: ${CONFIG.syncStatus}</div>`;
  document.getElementById('btn-sync-save').addEventListener('click', async () => {
    const mode = document.querySelector('input[name=mode]:checked').value;
    CONFIG.mode = mode;
    CONFIG.scriptUrl = document.getElementById('script-url').value.trim();
    CONFIG.csvUrl = document.getElementById('csv-url').value.trim();
    CONFIG.sheetUrl = document.getElementById('sheet-url').value.trim();
    await saveConfig();
    if (mode === 'local') {
      const hadLocal = await loadLocalItems();
      if (!hadLocal) { ITEMS = seedItems(); await saveLocalItems(); }
      await mergeItemsIntoHierarchy();
      statusEl.innerHTML = `<div class="banner ok">Modo local ativado.</div>`;
    } else {
      statusEl.innerHTML = `<div class="banner info">Sincronizando…</div>`;
      const ok = await trySync();
      if (ok) await mergeItemsIntoHierarchy();
      statusEl.innerHTML = ok
        ? `<div class="banner ok">Sincronizado! ${ITEMS.length} itens carregados da planilha.</div>`
        : `<div class="banner err">Não consegui sincronizar (${CONFIG.syncStatus}). Confira a URL e as permissões.</div>`;
    }
    renderModeSubtext(); renderAll();
  });
}

function renderAll() { renderGeral(); renderItens(); renderCategorias(); renderMensal(); renderAnual(); renderSync(); renderModeSubtext(); }

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('view-'+t.dataset.view).classList.add('active');
  });
});

(async function init() {
  await loadConfig();
  await loadHierarchy();
  refreshTopCats();
  let synced = false;
  if (CONFIG.mode !== 'local') synced = await trySync();
  if (!synced) {
    const hadLocal = await loadLocalItems();
    if (!hadLocal) { ITEMS = seedItems(); await saveLocalItems(); }
  }
  await mergeItemsIntoHierarchy();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('view-geral').style.display = '';
  renderAll();
})();
</script>
</body>
</html>
